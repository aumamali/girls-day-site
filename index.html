<!DOCTYPE html><html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تبریک ویژه کهکشانی</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Vazirmatn', sans-serif;
    }body {
  overflow: hidden;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background:
    radial-gradient(circle at 50% 30%, rgba(120,170,255,0.18), transparent 35%),
    radial-gradient(circle at 30% 70%, rgba(80,120,255,0.14), transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(255,255,255,0.06), transparent 25%),
    linear-gradient(to bottom, #020816, #07162f 45%, #030814);
  color: white;
  text-align: center;
  padding: 20px;
}

.stars, .stars2, .stars3, .nebula {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.stars {
  background-image:
    radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.9), transparent),
    radial-gradient(2px 2px at 80px 120px, rgba(255,255,255,0.8), transparent),
    radial-gradient(1px 1px at 140px 70px, rgba(255,255,255,0.7), transparent),
    radial-gradient(2px 2px at 200px 180px, rgba(255,255,255,0.9), transparent),
    radial-gradient(3px 3px at 250px 90px, rgba(255,255,255,1), transparent);
  background-size: 300px 300px;
  animation: drift 180s linear infinite, twinkle 4s ease-in-out infinite alternate;
}

.stars2 {
  background-image:
    radial-gradient(2px 2px at 50px 60px, rgba(180,220,255,0.9), transparent),
    radial-gradient(3px 3px at 180px 150px, rgba(255,255,255,0.95), transparent),
    radial-gradient(2px 2px at 100px 220px, rgba(220,240,255,0.8), transparent);
  background-size: 350px 350px;
  animation: drift 220s linear infinite reverse, twinkle 6s ease-in-out infinite alternate;
  opacity: 0.9;
}

.stars3 {
  background:
    radial-gradient(circle at 50% 20%, rgba(255,255,255,0.15), transparent 8%),
    radial-gradient(circle at 70% 75%, rgba(255,255,255,0.12), transparent 10%),
    radial-gradient(circle at 25% 65%, rgba(255,255,255,0.1), transparent 9%);
  animation: pulse 5s ease-in-out infinite;
}

.nebula {
  background:
    radial-gradient(circle at 40% 50%, rgba(120,170,255,0.12), transparent 35%),
    radial-gradient(circle at 65% 35%, rgba(180,220,255,0.08), transparent 30%);
  filter: blur(8px);
  animation: pulse 10s ease-in-out infinite;
}

.content {
  position: relative;
  z-index: 10;
  width: 78%;
  max-width: 620px;
  min-height: 220px;
  padding: 30px;
  background: rgba(10,18,35,0.45);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 30px rgba(120,170,255,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
}

#typed-text {
  font-size: 1.35rem;
  color: #f8faff;
  line-height: 2.1;
  text-shadow: 0 0 10px rgba(255,255,255,0.22), 0 0 20px rgba(150,190,255,0.12);
}

.cursor {
  display: inline-block;
  width: 3px;
  height: 1.3rem;
  background: #fff;
  margin-right: 4px;
  animation: blink 0.8s infinite;
}

.signature {
  position: absolute;
  bottom: 18px;
  width: 100%;
  text-align: center;
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  z-index: 20;
}

.signature span {
  color: #cdb4ff;
  font-weight: bold;
}

@keyframes blink {
  50% { opacity: 0; }
}

@keyframes twinkle {
  from { opacity: 0.5; }
  to { opacity: 1; }
}

@keyframes drift {
  from { transform: translateY(0); }
  to { transform: translateY(-120px); }
}

@keyframes pulse {
  0%,100% { opacity: 0.6; }
  50% { opacity: 1; }
}

  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="stars2"></div>
  <div class="stars3"></div>
  <div class="nebula"></div>  <div class="content">
    <div><span id="typed-text"></span><span class="cursor"></span></div>
  </div>  <div class="signature">ساخته شده توسط <span>SaLeNcE</span></div>  <script>
    const text = `عرضی ندارم بانو
فقط یادت باشد امروز که دختری
در آینده مادر دختر دیگری هستی
و روزی می‌آید که
مادری بزرگ می‌شوی
پس جدا از همه ناپاکی‌ها، تو پاک بمان🤍✨`;

    let index = 0;
    const speed = 55;
    const typedText = document.getElementById('typed-text');

    function typeWriter() {
      if (index < text.length) {
        typedText.innerHTML += text.charAt(index) === '\n' ? '<br>' : text.charAt(index);
        index++;
        setTimeout(typeWriter, speed);
      }
    }

    window.onload = typeWriter;
  </script></body>
</html>
